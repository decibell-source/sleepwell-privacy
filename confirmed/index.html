<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0A0E21">
    <title>SleepWell — Beta signup confirmed</title>
    <meta name="description" content="Your beta signup is confirmed. We'll be in touch soon.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="../app_icon.png">
    <link rel="apple-touch-icon" href="../app_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<canvas id="sky-canvas"></canvas>

<div class="page-content phase-section phase-deep-night" data-phase="deep-night" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div class="confirmed-card" style="max-width:520px; text-align:center; padding:48px 32px; background:linear-gradient(135deg, rgba(74,222,128,0.06), rgba(129,140,248,0.10)); border:1px solid rgba(74,222,128,0.20); border-radius:24px;">
        <div style="display:flex; justify-content:center; margin-bottom:24px;">
            <i class="ph-duotone ph-check-circle" style="font-size:64px; color:#86efac;"></i>
        </div>
        <h1 data-i18n="title" style="font-size:1.75rem; margin-bottom:16px; color:#fff;">You're in.</h1>
        <p data-i18n="body" style="color:rgba(255,255,255,0.85); line-height:1.65; font-size:1rem; margin-bottom:32px;">Your signup is confirmed. We'll email you the moment the beta opens — likely in a few weeks.</p>
        <a href="/" data-i18n="cta" class="btn btn-primary" style="display:inline-block;">Back to home</a>
    </div>
</div>

<script>
// Translations (auto-detect browser language, fallback EN)
var i18n = {
    en: {
        title: "You're in.",
        body: "Your signup is confirmed. We'll email you the moment the beta opens — likely in a few weeks.",
        cta: "Back to home",
        lang: "en"
    },
    fr: {
        title: "C'est confirmé.",
        body: "Ton inscription est validée. Je t'écris perso dès que la beta ouvre — d'ici quelques semaines.",
        cta: "Retour à l'accueil",
        lang: "fr"
    },
    es: {
        title: "Estás dentro.",
        body: "Tu registro está confirmado. Te avisaré por email en cuanto la beta abra — en unas semanas.",
        cta: "Volver al inicio",
        lang: "es"
    },
    de: {
        title: "Du bist dabei.",
        body: "Deine Anmeldung ist bestätigt. Ich melde mich per E-Mail, sobald die Beta startet — in ein paar Wochen.",
        cta: "Zurück zur Startseite",
        lang: "de"
    },
    it: {
        title: "Ci sei.",
        body: "La tua iscrizione è confermata. Ti scriverò via email appena la beta sarà aperta — tra qualche settimana.",
        cta: "Torna alla home",
        lang: "it"
    }
};
(function() {
    var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2).toLowerCase();
    var t = i18n[lang] || i18n.en;
    document.documentElement.lang = t.lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
    });
})();

// Reuse the celestial sky canvas from main page (simplified — static night)
(function() {
    var canvas = document.getElementById('sky-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize, { passive: true });
    var W, H;
    function paint() {
        W = canvas.width; H = canvas.height;
        var grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0A0E21');
        grad.addColorStop(0.5, '#1B2838');
        grad.addColorStop(1, '#0A0E21');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        // Static stars
        for (var i = 0; i < 80; i++) {
            var x = (i * 137.5) % W;
            var y = ((i * 71.7) % (H * 0.7));
            var r = ((i * 13) % 25) / 10 + 0.4;
            var a = ((i * 17) % 50) / 100 + 0.3;
            ctx.fillStyle = 'rgba(245, 245, 220, ' + a + ')';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }
        // Moon
        ctx.fillStyle = 'rgba(245, 245, 220, 0.85)';
        ctx.beginPath();
        ctx.arc(W * 0.78, H * 0.22, 38, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(245, 245, 220, 0.12)';
        ctx.beginPath();
        ctx.arc(W * 0.78, H * 0.22, 60, 0, Math.PI * 2);
        ctx.fill();
    }
    paint();
    window.addEventListener('resize', paint, { passive: true });
})();
</script>
</body>
</html>
